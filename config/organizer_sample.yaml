output: ./OrganizedPhotos
naming:
  pattern: "{date:%Y%m%d_%H%M%S}_{stem}{ext}"
destination:
  pattern: "{date:%Y}/{date:%m}"
  strategy: date
behavior:
  mode: copy
  dry_run: true
  plan: false
  reverse_geocode: false
  reconciliation_policy: precedence
  # Destination conflict policy:
  # suffix (default, safest): keep existing files and write _01, _02, ...
  # skip: leave existing destination untouched and skip the incoming file
  # overwrite-never: report the conflict as an error and continue
  # quarantine: copy the incoming file to <output>/.quarantine with a reason sidecar
  # fail-fast: stop the batch at the first destination conflict
  conflict_policy: suffix
  date_heuristics: true
  location_inference: true
  correction_manifest: corrections.yaml
  correction_priority: highest
  # clock_offset: apply a fixed time correction to every file's captured datetime.
  # Useful for cameras with a wrong clock (e.g. wrong timezone or drifted battery).
  # The original datetime is always preserved in the execution report.
  # Accepted formats: +3h, -1d, +00:30, -5:45, +12
  # For camera-specific offsets, add correction manifest rules with camera,
  # camera_make or camera_model selectors.
  # clock_offset: "+01:00"
  # staging_dir: write files to this temporary directory first; only after all
  # operations succeed are the files promoted to the final output directory.
  # Prevents partial or inconsistent output on failure. Recommended when
  # --output is on a network share, slow drive, or any destination where
  # partial writes are unacceptable.
  # staging_dir: "/tmp/photo-organizer-staging"
preview:
  # Generate JPEG previews for HEIC/HEIF files when pillow-heif/libheif can
  # decode the source image. Preview failures are logged and do not stop copy
  # or move operations.
  heic: false
interop:
  # Mark RAW files in reports as candidates for an optional external DNG
  # interoperability workflow. This does not convert files and does not change
  # organization behavior.
  dng_candidates: false
derivatives:
  # Optionally separate edited/exported/derived files from originals.
  # Matching files are written under output/<path>/ while preserving the normal
  # date/location structure below that path.
  enabled: false
  path: Derivatives
  # Comma-separated patterns work with the built-in YAML fallback. PyYAML also
  # accepts a real list.
  patterns: "*_edit*,*-edit*,*_edited*,*-edited*,*_export*,*-export*,*_derived*,*-derived*"
events:
  # Group photos into temporal events when consecutive timestamps are close.
  # When directory is false, event data appears only in execution reports.
  # When directory is true, files are written below a generated event folder.
  window_minutes: 60
  directory: false
  # Used by --by event. Supported fields: {date}, {event}, {event_id}, {index}.
  # directory_pattern: "{date:%Y}/{date:%Y-%m-%d}_{event}"
bursts:
  # Mark likely burst sequences for later review. No files are deleted.
  enabled: false
  # Consecutive photos within this many seconds can belong to the same burst.
  window_seconds: 2
  # Minimum number of photos required before a group is marked.
  min_photos: 3
  # Optional filename similarity confirmation from 0 to 1. When omitted,
  # temporal groups are marked REVIEW_BURST. When matched, they are BURST.
  # similarity_threshold: 0.8
